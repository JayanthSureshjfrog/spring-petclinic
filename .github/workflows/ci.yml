name: Petclinic CI with JFrog
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: petclinic
      IMAGE_TAG: 1.1.1
      BUILD_NAME: Petclinic CI with JFrog
      BUILD_NUMBER: ${{ github.run_number }}
      MODULE_NAME: petclinic-module
      PLATFORM_REPO: jay-maven-dev-virtual
      # Host-only for Docker login
      JFROG_URL: psblr.jfrog.io
      # Full URL (include scheme) for JFrog CLI config and mvn-config
      JF_URL: https://psblr.jfrog.io
      DOCKER_REPO: petclinic-docker-local
      JFROG_CLI_LOG_LEVEL: INFO

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: https://psblr.jfrog.io
        JF_ACCESS_TOKEN: ${{ secrets.JFROG_TOKEN }}

    - name: Check connectivity
      run: |
        jf config show
        jf rt ping
    
    - name: Generate Maven settings.xml
      run: |
        mkdir -p ~/.m2
        REPO_URL="${JF_URL}/artifactory/${PLATFORM_REPO}"
        cat > ~/.m2/settings.xml << EOF
        <settings>
          <servers>
            <server>
              <id>artifactory</id>
              <username>${{ secrets.JFROG_USER }}</username>
              <password>${{ secrets.JFROG_TOKEN }}</password>
            </server>
          </servers>
          <profiles>
            <profile>
              <id>artifactory</id>
              <repositories>
                <repository>
                  <id>artifactory</id>
                  <url>${REPO_URL}</url>
                  <releases><enabled>true</enabled></releases>
                  <snapshots><enabled>true</enabled></snapshots>
                </repository>
              </repositories>
              <pluginRepositories>
                <pluginRepository>
                  <id>artifactory</id>
                  <url>${REPO_URL}</url>
                  <releases><enabled>true</enabled></releases>
                  <snapshots><enabled>true</enabled></snapshots>
                </pluginRepository>
              </pluginRepositories>
            </profile>
          </profiles>
          <activeProfiles>
            <activeProfile>artifactory</activeProfile>
          </activeProfiles>
          <mirrors>
            <mirror>
              <id>artifactory</id>
              <mirrorOf>*</mirrorOf>
              <url>${REPO_URL}</url>
            </mirror>
          </mirrors>
        </settings>
        EOF
        echo "=== settings.xml (passwords masked) ==="
        sed 's|<password>.*</password>|<password>****</password>|g' ~/.m2/settings.xml
   
    - name: Maven Build and Deploy to Artifactory
      working-directory: ${{ github.workspace }}
      # run: mvn clean deploy -DskipTests -B -s ~/.m2/settings.xml
      run: mvn clean package -DskipTests -B -s ~/.m2/settings.xml

    - name: Upload Maven artifacts to Artifactory (build-info)
      working-directory: ${{ github.workspace }}
      run: |
        jf rt u "target/spring-petclinic-*.jar" "${PLATFORM_REPO}/org/springframework/samples/spring-petclinic/" \
          --build-name="${BUILD_NAME}" \
          --build-number="${BUILD_NUMBER}" \
          --module="${MODULE_NAME}" \
          --flat=true
        jf rt u "target/spring-petclinic-*.pom" "${PLATFORM_REPO}/org/springframework/samples/spring-petclinic/" \
          --build-name="${BUILD_NAME}" \
          --build-number="${BUILD_NUMBER}" \
          --module="${MODULE_NAME}" \
          --flat=true || true
    
    - name: Docker Login to Artifactory
      uses: docker/login-action@v2
      with:
        registry: ${{ env.JFROG_URL }}
        username: ${{ secrets.JFROG_USER }}
        password: ${{ secrets.JFROG_TOKEN }}

    - name: Docker Build
      working-directory: "${{ github.workspace }}"
      run: |  
          jf docker build -t ${JFROG_URL}/${DOCKER_REPO}/${IMAGE_NAME}:${IMAGE_TAG} .
          
    - name: Docker Push
      working-directory: "${{ github.workspace }}"
      run: |
          jf docker push "${JFROG_URL}/${DOCKER_REPO}/${IMAGE_NAME}:${IMAGE_TAG}" \
            --build-name="${BUILD_NAME}" \
            --build-number="${BUILD_NUMBER}" \
            --skip-login


    - name: Publish Build Info (Maven + Docker)
      run: |
        jf rt build-publish "${BUILD_NAME}" "${BUILD_NUMBER}" --detailed-summary=true --collect-env --collect-git-info 
        
    - name: Inspect published build-info
      run: |
        echo "=== Inspect Published build-info ==="
        jf rt curl -X GET '/api/build/"${BUILD_NAME}"/"${BUILD_NUMBER}"' || true
        
    - name: Xray Scan
      run: |
        jf build-scan "${BUILD_NAME}" "${BUILD_NUMBER}"  --fail=false --format=table --extended-table=true --rescan=false --vuln=true
        
    - name: Docker Image Scan
      run: |
        jf docker scan "${JFROG_URL}/${DOCKER_REPO}/${IMAGE_NAME}:${IMAGE_TAG}" --vuln=true --format=cyclonedx
